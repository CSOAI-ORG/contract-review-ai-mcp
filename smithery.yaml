name: contract-review-ai-mcp
description: Contract analysis, clause extraction, and risk assessment.
version: 1.0.0
tools:
- name: analyze_contract
  description: Analyze contract text for clauses and risks
  parameters:
  - name: contract_text
    type: string
    required: true
  - name: contract_type
    type: string
    required: false
- name: extract_clauses
  description: Extract specific clauses from contract
  parameters:
  - name: contract_text
    type: string
    required: true
  - name: clause_types
    type: array
    required: false
- name: identify_risks
  description: Identify potential risks in contract
  parameters:
  - name: contract_text
    type: string
    required: true
- name: compare_contracts
  description: Compare two contracts
  parameters:
  - name: contract1_id
    type: string
    required: true
  - name: contract2_id
    type: string
    required: true
- name: summarize_contract
  description: Generate contract summary
  parameters:
  - name: contract_text
    type: string
    required: true
- name: check_favourable_terms
  description: Check for favourable terms
  parameters:
  - name: contract_text
    type: string
    required: true
- name: get_review_history
  description: Get review history
  parameters:
  - name: limit
    type: integer
    required: false
